<!DOCTYPE html>
<html>

<head>
  <title>Mapa Interactivo</title>

  <style>

    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#f0f0f0;
    }

    #mapContainer{
      width:360px;
      aspect-ratio:9/16;
      position:relative;
      overflow:hidden;
      border:2px solid black;
    }

    .map-image{
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

    .character{
  position:absolute;
  aspect-ratio:1/1;
  z-index:20;
}
    .character-layer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}
   .checkpoint{
  position:absolute;
  cursor:pointer;
  transform: translate(-50%, -50%);
} 
    .popup{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:1000;
}
    .popup-content{
  background:white;
  width:80%;
  max-width:300px;

  padding:15px;

  border-radius:12px;

  text-align:center;
}
    #popupImage{
  width:100%;
  height:auto;
}

  </style>

</head>

<body>

  <div id="mapContainer"></div>

  <div id="popup" class="popup">

  <div id="popupContent" class="popup-content">

    <img id="popupImage">

    <p id="popupText"></p>

  </div>

</div>

  <script>

    const data = {
  mapImage: "https://storage.googleapis.com/glide-prod.appspot.com/uploads-v2/mH4HOfmnbxo82Zm1tazf/pub/6uZKG4gRQNG3ss5SUfYV.jpg",

  character:{
    imageFace:"https://storage.googleapis.com/glide-prod.appspot.com/uploads-v2/mH4HOfmnbxo82Zm1tazf/pub/KEFYrtEpN7ZThUOuQZ6d.png",
    imageHair:"https://storage.googleapis.com/glide-prod.appspot.com/uploads-v2/mH4HOfmnbxo82Zm1tazf/pub/RdqxEefyJ04NBikIMATF.png",
    x:7,
    y:7,
    size:12
  },
      checkpoints:[
    {
      id:"nivel0",
      x:50,
      y:50,
      size: 10,
      z:10,
      icon:"https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1781047149/725384_pzu8h5.png",
      popupImage:"https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1779325153/cld-sample-5.jpg",
      text:"Checkpoint de prueba"
    }
  ]

};

    const mapContainer = document.getElementById("mapContainer");

    const popup =
    document.getElementById("popup");

    const popupImage =
    document.getElementById("popupImage");

    const popupText =
    document.getElementById("popupText");

    const mapImage = document.createElement("img");

    mapImage.classList.add("map-image");

    mapImage.src = data.mapImage;

    mapContainer.appendChild(mapImage);

    const characterContainer = document.createElement("div");

    characterContainer.classList.add("character");

    characterContainer.style.width = data.character.size + "%";

    characterContainer.style.left = data.character.x + "%";

    characterContainer.style.top = data.character.y + "%";

    mapContainer.appendChild(characterContainer);

    const face = document.createElement("img");

      face.src = data.character.imageFace;

      face.style.width = "100%";

      face.classList.add("character-layer");

      characterContainer.appendChild(face);

    const hair = document.createElement("img");

hair.src = data.character.imageHair;

hair.style.width = "100%";

hair.classList.add("character-layer");    

characterContainer.appendChild(hair);

data.checkpoints.forEach(checkpoint => {

  const checkpointImage = document.createElement("img");

  checkpointImage.src = checkpoint.icon;

  checkpointImage.classList.add("checkpoint");

  checkpointImage.style.width = checkpoint.size + "%";

  checkpointImage.style.zIndex = checkpoint.z;

  checkpointImage.style.left = checkpoint.x + "%";

  checkpointImage.style.top = checkpoint.y + "%";

  checkpointImage.addEventListener("click", () => {

  popupImage.src =
    checkpoint.popupImage;

  popupText.textContent =
    checkpoint.text;

  popup.style.display = "flex";

});

  mapContainer.appendChild(checkpointImage);

});    


  </script>

</body>

</html>
